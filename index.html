<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="古诗诵读：从幼儿园到高中，一首一页，按年级、诗人、朝代、类型、主题查找，支持拼音、译文、注释、赏析，移动端优先。">
  <meta name="theme-color" content="#ffb300">
  <title>古诗诵读 · 实用知识库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="app-bar">
    <a class="app-bar__brand" href="#/">
      <span class="app-bar__logo">诗</span>
      <span class="app-bar__name">古诗诵读</span>
    </a>
    <div class="app-bar__search" id="global-search" role="search">
      <input id="search-input" type="search" placeholder="搜诗名 / 诗人 / 朝代 / 主题…"
             autocomplete="off" aria-label="全局搜索">
      <div class="search-pop" id="search-pop" hidden></div>
    </div>
    <button class="icon-btn" id="theme-toggle" aria-label="切换深色模式" title="切换深浅色">
      <span class="icon-sun">☀</span><span class="icon-moon">☾</span>
    </button>
  </header>

  <main id="view" class="view" aria-live="polite">
    <div class="loading"><span class="spinner"></span>加载中…</div>
  </main>

  <nav class="tab-bar" aria-label="主导航">
    <a href="#/" data-tab="home" class="tab-bar__item"><i>⌂</i><span>首页</span></a>
    <a href="#/search" data-tab="search" class="tab-bar__item"><i>⌕</i><span>查找</span></a>
    <button id="random-btn" data-tab="random" class="tab-bar__item"><i>⚄</i><span>随机</span></button>
    <button id="top-btn" data-tab="top" class="tab-bar__item"><i>↑</i><span>顶部</span></button>
  </nav>

  <script src="assets/app.js" defer></script>
</body>
</html>
