site_name: 古诗诵读
site_description: 从幼儿园到小学的古诗诵读知识库，一首一页，按年级、诗人、朝代、类型查找，移动端优先
site_url: https://chenzhengduan.github.io/study/
docs_dir: docs
site_dir: .site

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

extra_css:
  - assets/styles/poems.css

extra_javascript:
  - assets/scripts/poems-search.js

plugins:
  - awesome-pages:
      sort_type: natural
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

hooks:
  - hooks/standalone_title.py
  - hooks/poems_pager.py